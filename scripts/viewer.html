<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calcubench Results Viewer</title>
<style>
:root {
  --green: #06d6a0;
  --yellow: #ffd166;
  --red: #ef476f;
  --blue: #4361ee;
  --bg: #f8f9fa;
  --card: #fff;
  --text: #212529;
  --muted: #6c757d;
  --border: #dee2e6;
  --shadow: 0 1px 3px rgba(0,0,0,.08);
  --radius: 8px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.5;
}
nav {
  position: sticky; top: 0; z-index: 100;
  display: flex; gap: 0; background: #fff;
  border-bottom: 2px solid var(--blue);
  box-shadow: var(--shadow);
}
nav button {
  flex: 1; padding: 14px 16px; border: none; background: none;
  font-size: 15px; font-weight: 500; cursor: pointer; color: var(--muted);
  transition: color .15s, border-bottom .15s;
  border-bottom: 3px solid transparent;
}
nav button:hover { color: var(--text); }
nav button.active { color: var(--blue); border-bottom-color: var(--blue); }
.container { max-width: 1400px; margin: 0 auto; padding: 24px 16px; }
.tab { display: none; }
.tab.active { display: block; }
h2 { font-size: 22px; margin-bottom: 16px; }
h3 { font-size: 17px; margin-bottom: 12px; }
.card {
  background: var(--card); border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 20px; margin-bottom: 16px;
}
table { width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 8px; }
th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); }
th { background: var(--bg); font-weight: 600; position: sticky; top: 0; z-index: 1; }
td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
code, .mono { font-family: "SF Mono", "Fira Code", "Cascadia Code", Consolas, monospace; font-size: 13px; }

/* Dataset tab */
.ds-section { margin-bottom: 24px; }
.data-preview-wrap { max-height: 400px; overflow: auto; margin-top: 8px; border: 1px solid var(--border); border-radius: var(--radius); }
.data-preview-wrap table { margin: 0; }
.data-preview-wrap th { top: 0; z-index: 1; background: #e9ecef; }
.row-count { font-size: 13px; color: var(--muted); margin-top: 4px; }

/* Questions tab */
.filter-bar { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.filter-bar select { padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; }
.filter-bar .count { font-size: 13px; color: var(--muted); margin-left: auto; }
.status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
.dot-exact { background: var(--green); }
.dot-soft { background: var(--yellow); }
.dot-wrong { background: var(--red); }
.q-table { font-size: 13px; border-spacing: 0; }
.q-table th, .q-table td { padding: 8px 10px; vertical-align: top; }
.q-table td.q-text { max-width: 320px; min-width: 200px; }
.q-group-even td { background: #f8f9fb; }
.q-group-odd td { background: #fff; }
.response-preview {
  font-family: "SF Mono", "Fira Code", Consolas, monospace; font-size: 12px;
  color: var(--muted); cursor: pointer; max-width: 300px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  padding: 4px 8px; background: #f1f3f5; border-radius: 4px;
  transition: background .15s;
}
.response-preview:hover { background: #e2e6ea; color: var(--text); }
.exact-answer { font-weight: 600; }

/* Draggable post-it popups */
.postit {
  position: fixed; z-index: 1000;
  width: 480px; height: 350px; min-width: 280px; min-height: 150px;
  background: #fffde7; border: 1px solid #e0d88a;
  border-radius: 6px; box-shadow: 0 4px 20px rgba(0,0,0,.15);
  display: flex; flex-direction: column;
  font-size: 13px; resize: both; overflow: hidden;
}
.postit-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px; background: #fff9c4; border-bottom: 1px solid #e0d88a;
  border-radius: 6px 6px 0 0; cursor: grab; user-select: none;
  font-weight: 600; font-size: 13px;
}
.postit-header:active { cursor: grabbing; }
.postit-close {
  background: none; border: none; font-size: 18px; cursor: pointer;
  color: #999; padding: 0 4px; line-height: 1;
}
.postit-close:hover { color: var(--red); }
.postit-body {
  padding: 12px; overflow: auto; flex: 1;
  font-family: "SF Mono", "Fira Code", Consolas, monospace;
  font-size: 12px; white-space: pre-wrap; word-break: break-word;
  line-height: 1.5;
}
.hidden { display: none; }
</style>
</head>
<body>

<nav>
  <button class="active" data-tab="dataset">Datasets</button>
  <button data-tab="explorer">Questions</button>
</nav>

<div class="container">
<div id="tab-dataset" class="tab active"></div>
<div id="tab-explorer" class="tab"></div>
</div>


<script>
__INLINE_SCRIPT__
</script>

</body>
</html>
